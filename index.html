<!-- ===== FIREBASE ===== -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, addDoc, query, orderBy, limit, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // 🔧 REMPLACE CES VALEURS PAR TA CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAtoi-AS7QlZDLyAuGg_G1BqDeHScQfcAM",
  authDomain: "brainrot-gamble-e7463.firebaseapp.com",
  projectId: "brainrot-gamble-e7463",
  storageBucket: "brainrot-gamble-e7463.firebasestorage.app",
  messagingSenderId: "1065562519897",
  appId: "1:1065562519897:web:37d72dec694d82565ef448"
};

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window._fbGetLeaderboard = async function(tab) {
    const field = tab === 'level' ? 'totalLevel' : 'perSec';
    const q = query(collection(db, 'leaderboard'), orderBy(field, 'desc'), limit(20));
    const snap = await getDocs(q);
    return snap.docs.map((d, i) => ({rank: i+1, ...d.data(), id: d.id}));
  };

  window._fbSubmitScore = async function(name, coins, perSec, totalLevel) {
    await addDoc(collection(db, 'leaderboard'), {
      name: name.trim().slice(0, 24),
      coins,
      perSec,
      totalLevel,
      submittedAt: serverTimestamp()
    });
  };

  window._firebaseReady = true;
</script>

function generateBoost(tier) {
  const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  const type = ['coins','proba','price'][Math.floor(Math.random()*3)];
  const id = Date.now() + Math.random();
  if (tier === 'std') {
    if (type === 'coins')  return {id, type:'coins',  bonus:rand(10,50),  duration:rand(1,6)*3600,      label:'Boost de Pièces'};
    if (type === 'proba')  return {id, type:'proba',  bonus:rand(1,5),    rarity:['epique','legendaire','mythique'][Math.floor(Math.random()*3)], uses:rand(1,5),  label:'Boost de Rareté'};
    if (type === 'price')  return {id, type:'price',  bonus:rand(1,15),   target:['rare','epique'][Math.floor(Math.random()*2)],                  uses:rand(1,10), label:'Boost de Prix'};
  } else {
    if (type === 'coins')  return {id, type:'coins',  bonus:rand(50,100), duration:rand(6,10)*3600,     label:'Boost de Pièces'};
    if (type === 'proba')  return {id, type:'proba',  bonus:rand(5,10),   rarity:['divin','ultime'][Math.floor(Math.random()*2)],                 uses:rand(1,5),  label:'Boost de Rareté'};
    if (type === 'price')  return {id, type:'price',  bonus:rand(1,15),   target:['mythique','ultime'][Math.floor(Math.random()*2)],              uses:rand(1,5),  label:'Boost de Prix'};
  }
}

function boostDesc(b) {
  if (b.type === 'coins') return '+'+b.bonus+'% pièces/sec — '+Math.floor(b.duration/3600)+'h';
  if (b.type === 'proba') return '+'+b.bonus+'% '+RARITIES[b.rarity].label+' — '+b.uses+' ouvertures';
  if (b.type === 'price') return '-'+b.bonus+'% prix Coffre '+(b.target.charAt(0).toUpperCase()+b.target.slice(1))+' — '+b.uses+' ouvertures';
}

const RARITY_ORDER = ['STI','eternel','ancestral','secret','ultime','divin','mythique','legendaire','epique','tres-rare','rare','peu-commun','commun'];

function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
  if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('fr');
}

function pickRarity(proba) {
  const entries = Object.entries(proba);
  let r = Math.random() * entries.reduce((s,[,p])=>s+p,0);
  for (const [k,p] of entries) { r -= p; if (r <= 0) return k; }
  return entries[0][0];
}


function ImgWithFallback({src, fallback, wrapClass, emojiClass}) {
  const [failed, setFailed] = React.useState(false);
  if (!src || failed) return React.createElement('span', {className: emojiClass}, fallback);
  return React.createElement('div', {className: wrapClass},
    React.createElement('img', {
      src, alt: fallback,
      onError: () => setFailed(true),

function migrateCollection(col) {
  const out = {};
  for (const [n, d] of Object.entries(col)) {
    const nn = CARD_MIGRATIONS[n] || n;
    if (out[nn]) out[nn] = {...out[nn], level: Math.min(100, (out[nn].level||1) + (d.level||1))};

  }
  return out;
}

function getAchReward(ach) {
  const catAchs = ACHIEVEMENTS.filter(a => a.cat === ach.cat);
  const idx = catAchs.findIndex(a => a.id === ach.id);
  return idx >= 0 ? ACH_REWARDS[Math.min(idx, ACH_REWARDS.length - 1)] : 0;
}

const CHEAT_CARDS = ['Tung Tung Tung Sahur'];

function checkAchievements(collection, unlockedSet, totalChests) {
  // collection complète pour unique/rarity, mais niveau cheat ignoré pour maxlevel
  const unique = Object.keys(collection).length;
  const tc = totalChests || 0;
  // Combattant : ignorer le niveau des cartes cheat
  const maxLevel = Object.entries(collection)
    .filter(([name]) => !CHEAT_CARDS.includes(name))
    .reduce((m,[,d]) => Math.max(m, d.level||1), 0);
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(a => {
    if (unlockedSet.has(a.id)) return;
    if (a.type === 'unique' && unique >= a.req) newlyUnlocked.push(a);
    else if (a.type === 'total' && tc >= a.req) newlyUnlocked.push(a);
    else if (a.type === 'maxlevel' && maxLevel >= a.req) newlyUnlocked.push(a);
    else if (a.type === 'rarity') {
      const pool = BRAINROTS[a.rarity] || [];
      const owned = pool.filter(b => collection[b.name]);
      if (pool.length > 0 && owned.length === pool.length) newlyUnlocked.push(a);
    }
  });
  return newlyUnlocked;
}

const SAVE_KEY = 'brainrot_v2';

// === OBFUSCATION LAYER ===
const _$K = [0x4B,0x52,0x59,0x31,0x36,0x42,0x47,0x52];
const _$V = 0xDEAD ^ 0x1337;

function _$xk(s) {
  // XOR-rotate string encoding with position-dependent key
  let r = '';
  for (let i = 0; i < s.length; i++) {
    const k = _$K[i % _$K.length];
    const rot = (i * 7 + 3) & 0xFF;
    r += String.fromCharCode(s.charCodeAt(i) ^ k ^ rot);
  }
  return r;
}

function _$b64e(s) {
  return btoa(unescape(encodeURIComponent(s)));
}

function _$b64d(s) {
  return decodeURIComponent(escape(atob(s)));
}

// Dead code block A - never executed
function _$dc1(x) {
  const _unused = _$V * x + 0x1A2B;
  if (false) { return _unused ^ _$K[0]; }
  const _buf = new Uint8Array([0x42,0x47,0x4B]);
  return _buf[0] + _buf[1];
}

// Field name obfuscation map
const _$FM = (function() {
  const raw = ['coins','collection','ts','unlocked','totalChests','boostInventory','activeBoosts','_c'];
  const enc = raw.map((s,i) => btoa(String.fromCharCode(...[...s].map((c,j) => c.charCodeAt(0) ^ ((i*13+j*7+5)&0xFF)))));
  const fwd = {}, rev = {};
  raw.forEach((k,i) => { fwd[k] = enc[i]; rev[enc[i]] = k; });
  return {fwd, rev};
})();

// Dead code block B
function _$dc2(arr) {
  const _noop = arr.reduce ? arr.reduce((a,b) => a ^ b, _$V) : 0;
  if (_noop === 0xBEEF) { return _$K.slice(0,2); }
  return null;
}

function _$packObj(obj) {
  const out = {};
  for (const k in obj) {
    const ek = _$FM.fwd[k] || k;
    out[ek] = obj[k];
  }
  return out;
}

function _$unpackObj(obj) {
  const out = {};
  for (const k in obj) {
    const dk = _$FM.rev[k] || k;
    out[dk] = obj[k];
  }
  return out;
}

// Dead code block C
const _$dc3 = (function() {
  let _x = 0x1234;
  for (let i = 0; i < 8; i++) _x = (_x * 6364136223846793005 + 1442695040888963407) >>> 0;
  return _x;
})();

function _$chk(data) {
  // Simple integrity checksum
  const s = JSON.stringify(data);
  let h = 0x811C9DC5;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return (h >>> 0).toString(16).padStart(8,'0');
}

// Dead code block D
function _$dc4(v) {
  const _table = [0xA1,0xB2,0xC3,0xD4,0xE5,0xF6];
  if (typeof v !== 'number') return _$dc3;
  return _table[Math.abs(v|0) % _table.length] ^ _$V;
}

function encodeState(coins, collection, timestamp, unlocked, totalChests, boostInventory, activeBoosts) {
  try {
    const payload = {
      coins, collection,
      ts: timestamp,
      unlocked: [...(unlocked||[])],
      totalChests: totalChests||0,
      boostInventory: boostInventory||[],
      activeBoosts: activeBoosts||[]
    };
    const chk = _$chk(payload);
    const packed = _$packObj({...payload, _c: chk});
    const json = JSON.stringify(packed);
    // Layer 1: XOR encode the JSON string
    const xored = _$xk(json);
    // Layer 2: base64 the XOR'd bytes
    const b64 = _$b64e(xored);
    // Layer 3: shuffle with a fixed interleave pattern
    let out = '';
    const mid = Math.floor(b64.length / 2);
    for (let i = 0; i < mid; i++) {
      out += b64[i + mid];
      out += b64[i];
    }
    if (b64.length % 2 !== 0) out += b64[b64.length - 1];
    return out;
  } catch(e) { return ''; }
}

function decodeState(code) {
  try {
    const t = code.trim();
    // Reverse Layer 3: de-interleave
    let b64 = '';
    const pairs = Math.floor(t.length / 2);
    const evens = [], odds = [];
    for (let i = 0; i < t.length - (t.length % 2); i += 2) {
      evens.push(t[i+1]);
      odds.push(t[i]);
    }
    b64 = evens.join('') + odds.join('');
    if (t.length % 2 !== 0) b64 += t[t.length - 1];
    // Reverse Layer 2: base64 decode
    const xored = _$b64d(b64);
    // Reverse Layer 1: XOR decode (symmetric)
    const json = _$xk(xored);
    const packed = JSON.parse(json);
    const unpacked = _$unpackObj(packed);
    // Verify checksum
    const savedChk = unpacked._c;
    delete unpacked._c;
    const expectedChk = _$chk(unpacked);
    if (savedChk !== expectedChk) { return null; }
    if (unpacked && unpacked.collection) unpacked.collection = migrateCollection(unpacked.collection);
    return unpacked;
  } catch(e) { return null; }
}

function lsTrySave(coins, collection, unlocked, totalChests, boostInventory, activeBoosts) {
  try { localStorage.setItem(SAVE_KEY, encodeState(coins, collection, Date.now(), unlocked, totalChests, boostInventory, activeBoosts)); } catch(e) {}
}

function lsTryLoad() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) { const s = decodeState(raw); return s; }
  } catch(e) {}
  return null;
}

// ===== APP =====
function App() {
  // Try to load from localStorage on first render
  const initData = (() => {
    const saved = lsTryLoad();
    if (saved) return saved;
    return { coins: 2000, collection: {}, ts: null, totalChests: 0 };
  })();

  // Recalculer les succès depuis zéro en excluant les cartes cheat
  const cleanInitUnlocked = (() => {
    const col = initData.collection || {};
    const tc = initData.totalChests || 0;
    // Utilise checkAchievements qui exclut déjà les CHEAT_CARDS
    const legitAchs = new Set(checkAchievements(col, new Set(), tc).map(a => a.id));
    // Réécrire localStorage avec les succès propres
    try {
      const fixed = encodeState(initData.coins, col, Date.now(), legitAchs, tc, initData.boostInventory||[], initData.activeBoosts||[]);
      localStorage.setItem('brainrot_v2', fixed);
    } catch(e) {}
    return legitAchs;
  })();

  const [screen, setScreen]     = useState('menu');
  const [coins, setCoins]       = useState(initData.coins);
  const [collection, setCollection] = useState(initData.collection);
  const [opening, setOpening]   = useState(null);
  const [notifs, setNotifs]     = useState([]);
  const [saveModal, setSaveModal] = useState(false);
  const [saveCode, setSaveCode]  = useState('');
  const [loadInput, setLoadInput] = useState('');
  const [offlineGain, setOfflineGain] = useState(null);
  const [unlocked, setUnlocked] = useState(() => cleanInitUnlocked);
  const [totalChests, setTotalChests] = useState(initData.totalChests || 0);
  const [boostInventory, setBoostInventory] = useState(initData.boostInventory || []);
  const [activeBoosts, setActiveBoosts]     = useState(initData.activeBoosts   || []);
  const [pendingCoinBoost, setPendingCoinBoost] = useState(null); // boost en attente de sélection BrainRot
  const [showLeaderboard, setShowLeaderboard] = useState(false);
  const [lbData, setLbData]         = useState([]);
  const [lbLoading, setLbLoading]   = useState(false);
  const [lbName, setLbName]         = useState('');
  const [lbSubmitting, setLbSubmitting] = useState(false);
  const [lbSubmitted, setLbSubmitted]   = useState(false);
  const [lbError, setLbError]       = useState('');
  const [lbTab, setLbTab]           = useState('perSec');
  const coinsRef = useRef(initData.coins);
  const collectionRef = useRef(initData.collection);
  const unlockedRef = useRef(cleanInitUnlocked);
  const totalChestsRef = useRef(initData.totalChests || 0);
  const pendingAchsRef = useRef([]);
  const boostInventoryRef = useRef(initData.boostInventory || []);
  const activeBoostsRef   = useRef(initData.activeBoosts   || []);

  // Compute offline gain from saved timestamp (with coin boost)
  useEffect(() => {
    if (!initData.ts) return;
    const elapsed = (Date.now() - initData.ts) / 1000; // seconds
    if (elapsed < 10) return;
    const savedActive = initData.activeBoosts || [];
    const now = Date.now();
    // For each second of offline time, apply boost if still active
    // Simplified: compute average multiplier over offline period
    const ps = Object.entries(initData.collection).reduce((s,[name,d]) => {
      const base = RARITIES[d.rarity].gain * (d.level||1);
      const coinBoost = savedActive.find(b => b.type==='coins' && b.target===name && b.expiresAt > now);
      const mult = coinBoost ? (1 + coinBoost.bonus/100) : 1;
      return s + base * mult;
    }, 0);
    if (ps <= 0) return;
    const gained = Math.floor(ps * elapsed);
    if (gained > 0) {
      setCoins(c => c + gained);
      setOfflineGain(gained);
      setTimeout(() => setOfflineGain(null), 6000);
    }
  }, []);

  useEffect(() => { coinsRef.current = coins; }, [coins]);
  useEffect(() => { boostInventoryRef.current = boostInventory; }, [boostInventory]);
  useEffect(() => {
    // Nettoyer les boosts de pièces expirés
    const now = Date.now();
    const cleaned = activeBoosts.filter(b => {
      if (b.type === 'coins') return b.expiresAt > now;
      return b.uses > 0;
    });
    if (cleaned.length !== activeBoosts.length) {
      setActiveBoosts(cleaned);
      activeBoostsRef.current = cleaned;
    }
    activeBoostsRef.current = activeBoosts;
  }, [activeBoosts]);
  useEffect(() => { collectionRef.current = collection; }, [collection]);

  const now = Date.now();
  const activeCoinBoost = activeBoosts.find(b => b.type === 'coins' && b.expiresAt > now);
  const perSec = Object.entries(collection).reduce((s,[name,d]) => {
    const base = RARITIES[d.rarity].gain * (d.level||1);
    const mult = (activeCoinBoost && activeCoinBoost.target === name) ? (1 + activeCoinBoost.bonus/100) : 1;
    return s + base * mult;
  }, 0);

  // Passive income tick
  useEffect(() => {
    if (perSec <= 0) return;
    const id = setInterval(() => setCoins(c => c + perSec / 10), 100);
    return () => clearInterval(id);
  }, [perSec]);

  // Refresh every second to update clocks and clean expired boosts
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => {
      const now = Date.now();
      const expired = activeBoostsRef.current.some(b => b.type === 'coins' && b.expiresAt <= now);
      if (expired) {
        const updated = activeBoostsRef.current.filter(b => b.type !== 'coins' || b.expiresAt > now);
        activeBoostsRef.current = updated;
        setActiveBoosts(updated);
      }
      setTick(t => t + 1);
    }, 1000);
    return () => clearInterval(id);
  }, []);

  // Auto-save to localStorage every 10s
  useEffect(() => {
    const id = setInterval(() => {
      lsTrySave(coinsRef.current, collectionRef.current, unlockedRef.current, totalChestsRef.current, boostInventoryRef.current, activeBoostsRef.current);
    }, 10000);
    return () => clearInterval(id);
  }, []);

  // Opening animation phases
  useEffect(() => {
    if (!opening) return;
    if (opening.phase === 'shake') {
      const t = setTimeout(() => setOpening(o => o && {...o, phase:'reveal'}), 2000);
      return () => clearTimeout(t);
    }
    if (opening.phase === 'reveal') {
      const t = setTimeout(() => setOpening(o => {
        if (!o) return null;
        // Déclencher les notifications de succès à la révélation de la carte
        if (o.pendingAchs && o.pendingAchs.length > 0) {
          let totalReward = 0;
          o.pendingAchs.forEach((a, i) => {
            const reward = getAchReward(a);
            totalReward += reward;
            setTimeout(() => notify('🏆 ' + a.name + ' ' + a.badge + ' — 🪙 +' + fmt(reward), '#a855f7'), i * 600);
          });
          if (totalReward > 0) setCoins(c => c + totalReward);
        }
        return {...o, phase:'ready', pendingAchs:[]};
      }), 800);
      return () => clearTimeout(t);
    }
  }, [opening && opening.phase]);

  function notify(msg, color='#22c55e') {
    const id = Date.now() + Math.random();
    setNotifs(n => [...n, {id, msg, color}]);
    setTimeout(() => setNotifs(n => n.filter(x => x.id !== id)), 3500);
  }

  function handleUseBoost(boostId) {
    const boost = boostInventoryRef.current.find(b => b.id === boostId);
    if (!boost) return;
    if (boost.type === 'coins') {
      // Redirect to collection to pick a BrainRot
      setPendingCoinBoost(boost);
      setScreen('collection');
      notify('🎯 Choisis un BrainRot à booster !', '#a855f7');
      return;
    }
    // Bloquer si un boost du même type est déjà actif
    if (boost.type === 'proba' && activeBoostsRef.current.find(b => b.type === 'proba' && b.uses > 0)) {
      notify('❌ Un boost de rareté est déjà actif !', '#ef4444');
      return;
    }
    if (boost.type === 'price' && activeBoostsRef.current.find(b => b.type === 'price' && b.uses > 0)) {
      notify('❌ Un boost de prix est déjà actif !', '#ef4444');
      return;
    }
    // Remove from inventory
    const newInv = boostInventoryRef.current.filter(b => b.id !== boostId);
    boostInventoryRef.current = newInv;
    setBoostInventory(newInv);
    const newActive = [...activeBoostsRef.current.filter(b => b.type !== boost.type || b.type === 'price'), {...boost}];
    activeBoostsRef.current = newActive;
    setActiveBoosts(newActive);
    notify('⚡ Boost activé : ' + boost.label + ' !', '#a855f7');
  }

  function handleApplyCoinBoost(brName) {
    const boost = pendingCoinBoost;
    if (!boost) return;
    setPendingCoinBoost(null);
    // Remove from inventory
    const newInv = boostInventoryRef.current.filter(b => b.id !== boost.id);
    boostInventoryRef.current = newInv;
    setBoostInventory(newInv);
    // Activate with target BrainRot
    const active = {...boost, expiresAt: Date.now() + boost.duration * 1000, target: brName};
    const newActive = [...activeBoostsRef.current, active];
    activeBoostsRef.current = newActive;
    setActiveBoosts(newActive);
    notify('💰 Boost appliqué à ' + brName + ' ! +' + boost.bonus + '% pendant ' + Math.floor(boost.duration/3600) + 'h', '#22c55e');
  }

  function handleOpenChest(chestId, count = 1) {
    // Check if it's a boost chest
    const boostChest = BOOST_CHESTS.find(c => c.id === chestId);
    if (boostChest) {
      if (coinsRef.current < boostChest.price * count) {
        notify('❌ Pas assez de pièces ! (' + fmt(boostChest.price * count) + ' requises)', '#ef4444');
        return;
      }
      setCoins(c => c - boostChest.price * count);
      const newBoosts = [];
      for (let i = 0; i < count; i++) {
        newBoosts.push(generateBoost(chestId === 'boost-std' ? 'std' : 'adv'));
      }
      const newInv = [...boostInventoryRef.current, ...newBoosts];
      boostInventoryRef.current = newInv;
      setBoostInventory(newInv);
      notify('🧪 ' + count + ' boost(s) obtenu(s) ! Consulte ton inventaire.', '#a855f7');
      return;
    }
    const chest = CHESTS.find(c => c.id === chestId);
    // Apply active price boost
    const activePriceBoost = activeBoostsRef.current.find(b => b.type === 'price' && b.target === chestId && b.uses > 0);
    const priceDiscount = activePriceBoost ? (1 - activePriceBoost.bonus / 100) : 1;
    const totalCost = Math.floor(chest.price * count * priceDiscount);
    if (coinsRef.current < totalCost) {
      notify('❌ Pas assez de pièces ! (' + fmt(totalCost) + ' requises)', '#ef4444');
      return;
    }

    // Apply active proba boost
    const activeProbaBoost = activeBoostsRef.current.find(b => b.type === 'proba' && b.uses > 0);
    const cards = [];
    for (let i = 0; i < count; i++) {
      let proba = {...chest.proba};
      if (activeProbaBoost && proba['commun'] !== undefined && proba[activeProbaBoost.rarity] !== undefined) {
        const reduction = Math.min(activeProbaBoost.bonus, proba['commun'] - 1);
        proba['commun'] -= reduction;
        proba[activeProbaBoost.rarity] = (proba[activeProbaBoost.rarity] || 0) + reduction;
      }
      const rarity = pickRarity(proba);
      const pool = BRAINROTS[rarity];
      const br = pool[Math.floor(Math.random() * pool.length)];
      cards.push({br, rarity});
    }

    const newTotal = totalChestsRef.current + count;
    totalChestsRef.current = newTotal;
    setTotalChests(newTotal);

    setCoins(c => c - totalCost);

    // Decrement uses on proba and price boosts
    const updatedActive = activeBoostsRef.current.map(b => {
      if ((b.type === 'proba' && b.uses > 0) || (b.type === 'price' && b.target === chestId && b.uses > 0)) {
        return {...b, uses: b.uses - count};
      }
      return b;
    }).filter(b => b.type === 'coins' || b.uses > 0);
    activeBoostsRef.current = updatedActive;
    setActiveBoosts(updatedActive);

    setCollection(prev => {
      const next = {...prev};
      for (const {br, rarity} of cards) {
        const existing = next[br.name];
        if (existing) {
          next[br.name] = {...existing, level: Math.min(existing.level + 1, 100)};
        } else {
          next[br.name] = {rarity, level:1, emoji:br.emoji};
        }
      }
      collectionRef.current = next;
      const newAchs = checkAchievements(next, unlockedRef.current, newTotal);
      let pendingAchs = [];
      if (newAchs.length > 0) {
        pendingAchs = newAchs;
        const newSet = new Set([...unlockedRef.current, ...newAchs.map(a=>a.id)]);
        unlockedRef.current = newSet;
        setUnlocked(new Set(newSet));
      }
      pendingAchsRef.current = pendingAchs;
      return next;
    });

    if (count === 1) {
      setOpening({chestEmoji: chest.emoji, phase:'waiting', br: cards[0].br, rarity: cards[0].rarity, pendingAchs: pendingAchsRef.current, multi: null});
    } else {
      setOpening({chestEmoji: chest.emoji, phase:'multi', cards, pendingAchs: pendingAchsRef.current, multi: true});
    }
  }

            return React.createElement('div', {className:'chest-price', style:{lineHeight:1.4}},
              discounted
                ? React.createElement(React.Fragment, null,
                    React.createElement('span', {style:{textDecoration:'line-through', color:'#888', fontSize:'0.85em'}}, '🪙 ' + fmt(chest.price)),
                    React.createElement('br', null),
                    React.createElement('span', {style:{color:'#22c55e', fontWeight:'bold'}}, '🪙 ' + fmt(newPrice) + ' (-'+activePriceBoost.bonus+'%)')
                  )
                : '🪙 ' + fmt(chest.price)
            );
          })(),
          React.createElement('button', {
            className:'buy-btn',
            disabled: coins < chest.price,
            onClick: () => setPickModal(chest)
          }, coins >= chest.price ? '🎁 Ouvrir !' : '🔒 Insuffisant'),
          React.createElement('div', {className:'chest-proba'},
            Object.entries(chest.proba).filter(([r]) => r !== 'STI').map(([r,p]) => {
              const isCommun = r === 'commun';
              const isBoostTarget = activeProbaBoost && r === activeProbaBoost.rarity;
              // reduction only applies if the chest has both commun AND the boost target rarity
              const hasTarget = activeProbaBoost && chest.proba[activeProbaBoost.rarity] !== undefined;
              const hasCommun = chest.proba['commun'] !== undefined;
              const reduction = (activeProbaBoost && hasTarget && hasCommun)
                ? Math.min(activeProbaBoost.bonus, (chest.proba['commun'] || 0) - 1) : 0;
              const newP = isCommun ? p - reduction : isBoostTarget ? p + reduction : p;
              const changed = reduction > 0 && (isCommun || isBoostTarget);
              return React.createElement('div', {key:r, style:{display:'flex', alignItems:'center', gap:4, marginBottom:1}},
                React.createElement('span', {style:{color: RARITIES[r].color, minWidth:90, fontSize:'0.68em'}},
                  RARITIES[r].label + ': ' + p + '%'
                ),
                changed && React.createElement('span', {style:{
                  color:'#22c55e', fontSize:'0.68em', fontWeight:'bold',
                  background:'rgba(34,197,94,0.18)', borderRadius:4, padding:'0 4px'
                }}, (isCommun ? '▼ ' : '▲ ') + newP + '%')
              );
            })
          )
        )
      )
    ),

    // Boost chests section
    React.createElement('div', {style:{color:'#a855f7', fontWeight:'bold', fontSize:16, margin:'24px 0 10px', textAlign:'center'}}, '🧪 Coffres de Boosts'),

          React.createElement('div', {className:'chest-name'}, chest.name),
          React.createElement('div', {className:'chest-price'}, '🪙 ' + fmt(chest.price)),
          React.createElement('button', {
            className:'buy-btn',
            disabled: coins < chest.price,
            onClick: () => onOpen(chest.id, 1)
          }, coins >= chest.price ? '🧪 Obtenir !' : '🔒 Insuffisant'),
          React.createElement('div', {style:{fontSize:11, color:'#ccc', marginTop:6, textAlign:'center', lineHeight:1.5}},
            chest.id === 'boost-std'
              ? React.createElement(React.Fragment, null,
                  React.createElement('div', null, '💰 Pièces: +10-50%, 1-6h'),
                  React.createElement('div', null, '🎲 Rareté: +1-5%, Épique→Myth.'),
                  React.createElement('div', null, '💸 Prix: -1-15%, Rare/Épique')
                )
              : React.createElement(React.Fragment, null,
                  React.createElement('div', null, '💰 Pièces: +50-100%, 6-10h'),
                  React.createElement('div', null, '🎲 Rareté: +5-10%, Divin/Ultime'),
                  React.createElement('div', null, '💸 Prix: -1-15%, Myth./Ultime')
                )

        )
      )
    )
  );
}


function CollectionScreen({collection, perSec, setScreen, unlocked, boostInventory, activeBoosts, onUseBoost, pendingCoinBoost, onApplyCoinBoost, onCancelCoinBoost}) {

        } else {
          status = b.uses + ' ouverture(s) restante(s)';

      })
    ),

    // BrainRot tab

      pendingCoinBoost && React.createElement('div', {
        style:{background:'linear-gradient(135deg,#2a0f3e,#1a0a2e)', border:'2px solid #a855f7',
               borderRadius:12, padding:'12px 16px', marginBottom:12, textAlign:'center'}
      },
        React.createElement('div', {style:{color:'#a855f7', fontWeight:'bold', fontSize:15, marginBottom:4}}, '🎯 Mode sélection de boost'),
        React.createElement('div', {style:{color:'#ddd', fontSize:12}}, 'Clique sur un BrainRot pour lui appliquer : +'+pendingCoinBoost.bonus+'% pièces/sec pendant '+Math.floor(pendingCoinBoost.duration/3600)+'h'),
        React.createElement('button', {
          onClick: () => onCancelCoinBoost && onCancelCoinBoost(),

        }, '✖ Annuler')
      ),
      entries.length === 0
        ? React.createElement('div', {className:'empty'}, '🎴 Aucune carte encore ! Ouvre des coffres à la boutique !')
        : React.createElement('div', {className:'cards-grid'},
            entries.map(([name, d]) => {
              const r = RARITIES[d.rarity];
              const lv = d.level || 1;
              const isMax = lv >= 100;
              const activeCoinOnThis = activeBoosts && activeBoosts.find(b => b.type === 'coins' && b.target === name && b.expiresAt > Date.now());
              // Clock timer for active coin boost
              let clockEl = null;
              if (activeCoinOnThis) {
                const rem = Math.max(0, activeCoinOnThis.expiresAt - Date.now());
                const totalSecs = Math.ceil(rem / 1000);
                const hrs = Math.floor(totalSecs / 3600);
                const mins = Math.floor((totalSecs % 3600) / 60);
                const clockStr = hrs > 0 ? hrs+'h'+String(mins).padStart(2,'0') : mins+'m'+String(totalSecs%60).padStart(2,'0');
                clockEl = React.createElement('div', {
                  style:{
                    position:'absolute', top:4, left:4, zIndex:10,

                    fontSize:9, color:'#22c55e', fontWeight:'bold', lineHeight:1.4,
                    border:'1px solid #22c55e', display:'flex', alignItems:'center', gap:2
                  }

              }

                key:name,
                className:'br-card',

                  cursor: (pendingCoinBoost && !activeCoinOnThis) ? 'pointer' : pendingCoinBoost ? 'not-allowed' : 'default',
                  outline: (pendingCoinBoost && !activeCoinOnThis) ? '2px dashed #a855f7' : activeCoinOnThis ? '2px solid #22c55e' : 'none',
                  opacity: (pendingCoinBoost && activeCoinOnThis) ? 0.5 : 1,
                  position:'relative'
                },

              },
                clockEl,
                React.createElement('div', {className:'br-card-border', style:{borderColor: pendingCoinBoost && !activeCoinOnThis ? '#a855f7' : activeCoinOnThis ? '#22c55e' : r.color}}),
                IMGS[name]
                  ? React.createElement(ImgWithFallback, {src:IMGS[name], fallback:d.emoji, wrapClass:'br-img-wrap', emojiClass:'br-emoji'})
                  : React.createElement('span', {className:'br-emoji'}, d.emoji),
                React.createElement('div', {
                  className: 'br-count' + (isMax ? ' br-count-max' : ''),
                  style: isMax ? {background:'linear-gradient(135deg,#fbbf24,#f59e0b)', color:'#000'} : {}
                }, isMax ? '⭐ MAX' : 'Niv.'+lv),
                React.createElement('div', {className:'br-name'}, name),
                React.createElement('div', {className:'br-rarity', style:{color:r.color}}, r.label),
                React.createElement('div', {className:'br-gain', style:{display:'flex', alignItems:'center', gap:4, justifyContent:'center', flexWrap:'wrap'}},
                  React.createElement('span', null, '⚡ '+(Math.floor(r.gain*lv * (activeCoinOnThis ? 1+activeCoinOnThis.bonus/100 : 1)))+'/s'),
                  activeCoinOnThis && React.createElement('span', {
                    style:{color:'#22c55e', fontSize:10, fontWeight:'bold', background:'rgba(34,197,94,0.15)', padding:'1px 5px', borderRadius:5}
                  }, '+'+activeCoinOnThis.bonus+'%')
                )
              );
            })
          )
    ),

    // Boost inventory tab
    tab === 'boost' && (
      (!boostInventory || boostInventory.length === 0)
        ? React.createElement('div', {className:'empty'}, '🧪 Aucun boost en inventaire ! Achète des coffres de boosts !')
        : React.createElement('div', {style:{display:'flex', flexDirection:'column', gap:10}},
            boostInventory.map((b) =>
              React.createElement('div', {key:b.id, style:{
                background:'#1a1a2e', border:'2px solid #a855f7', borderRadius:12,
                padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
                boxShadow:'0 4px 14px rgba(168,85,247,0.2)'
              }},
                React.createElement('div', null,
                  React.createElement('div', {style:{color:'#a855f7', fontWeight:'bold', fontSize:14}},
                    (b.type === 'coins' ? '💰' : b.type === 'proba' ? '🎲' : '💸') + ' ' + b.label
                  ),
                  React.createElement('div', {style:{color:'#ccc', fontSize:12, marginTop:3}}, boostDesc(b))
                ),
                (() => {
                  const alreadyActive =
                    (b.type === 'proba' && activeBoosts && activeBoosts.find(ab => ab.type === 'proba' && ab.uses > 0)) ||
                    (b.type === 'price' && activeBoosts && activeBoosts.find(ab => ab.type === 'price' && ab.uses > 0));
                  return React.createElement('button', {
                    onClick: () => !alreadyActive && onUseBoost(b.id),
                    disabled: !!alreadyActive,
                    title: alreadyActive ? 'Un boost de ce type est déjà actif' : '',
                    style:{
                      background: alreadyActive ? '#333' : 'linear-gradient(135deg,#7c3aed,#a855f7)',
                      border:'none', color: alreadyActive ? '#555' : '#fff',
                      borderRadius:8, padding:'8px 14px',
                      cursor: alreadyActive ? 'not-allowed' : 'pointer',
                      fontWeight:'bold', fontSize:13, fontFamily:"'Fredoka One',cursive"
                    }
                  }, alreadyActive ? '🔒 Déjà actif' : '⚡ Utiliser');
                })()
              )
            )
          )
    )
  );
}

function AchievementsScreen({collection, unlocked, setScreen, totalChests}) {
  const unique = Object.keys(collection).length;
  const tc = totalChests || 0;
  const maxLevel = Object.values(collection).reduce((m,d) => Math.max(m, d.level||1), 0);

  function getProgress(a) {
    if (a.type === 'unique') {
      return { cur: Math.min(unique, a.req), max: a.req };
    }
    if (a.type === 'total') {
      return { cur: Math.min(tc, a.req), max: a.req };
    }
    if (a.type === 'maxlevel') {
      return { cur: Math.min(maxLevel, a.req), max: a.req };
    }
    if (a.type === 'rarity') {
      const pool = BRAINROTS[a.rarity] || [];
      const owned = pool.filter(b => collection[b.name]).length;
      return { cur: owned, max: pool.length };
    }
    return { cur: 0, max: 1 };
  }

  function formatProgress(cur, max) {
    const f = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : String(n);
    return f(cur) + ' / ' + f(max);
  }

  const CATS = [
    { key:'collectionneur', label:'🗂️ Collectionneur', color:'#a855f7' },
    { key:'joueur',         label:'🎮 Joueur',          color:'#22c55e' },
    { key:'rarete',         label:'✨ Rareté',           color:'#f59e0b' },
    { key:'combattant',     label:'⚔️ Combattant',       color:'#ef4444' },
  ];

  return React.createElement('div', {className:'ach-screen'},
    React.createElement('div', {className:'screen-top'},
      React.createElement('button', {className:'back-btn', onClick:()=>setScreen('collection')}, '⬅ Collection'),
      React.createElement('div', {className:'screen-title'}, '🏆 Succès')
    ),
    React.createElement('div', {style:{textAlign:'center', color:'rgba(255,255,255,0.4)', fontSize:'0.85em', marginBottom:'24px'}},
      `${unlocked.size} / ${ACHIEVEMENTS.length} succès débloqués`
    ),
    CATS.map(cat => {
      const list = ACHIEVEMENTS.filter(a => a.cat === cat.key);
      const catUnlocked = list.filter(a => unlocked.has(a.id)).length;
      return React.createElement('div', {key: cat.key, className:'ach-category'},
        React.createElement('div', {className:'ach-cat-header'},
          React.createElement('span', {className:'ach-cat-title', style:{color: cat.color}}, cat.label),
          React.createElement('span', {className:'ach-cat-count'},
            `${catUnlocked}/${list.length}`
          )
        ),
        React.createElement('div', {className:'ach-grid'},
          list.map(a => {
            const isUnlocked = unlocked.has(a.id);
            const {cur, max} = getProgress(a);
            const pct = max > 0 ? Math.round((cur / max) * 100) : 0;
            return React.createElement('div', {
              key: a.id,
              className: 'ach-card ' + (isUnlocked ? 'unlocked' : 'locked')
            },
              React.createElement('div', {className:'ach-badge'}, a.badge),
              React.createElement('div', {className:'ach-info'},
                React.createElement('div', {className:'ach-name'}, a.name),
                React.createElement('div', {className:'ach-desc'}, a.desc),
                React.createElement('div', {className:'ach-prog-bar'},
                  React.createElement('div', {className:'ach-prog-fill', style:{width: pct+'%'}})
                ),
                React.createElement('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:2}},
                  isUnlocked
                    ? React.createElement('span', {className:'ach-unlock-stamp'}, '✅ Débloqué !')
                    : React.createElement('span', {className:'ach-prog-text'}, formatProgress(cur, max)),
                  React.createElement('span', {style:{fontSize:11, color: isUnlocked ? '#ffd700' : 'rgba(255,215,0,0.4)', fontWeight:'bold'}},
                    '🪙 ' + fmt(getAchReward(a))
                  )
                )
              )
            );
          })
        )
      );
    })
  );
}

function OpeningOverlay({opening, onClose, onOpen}) {
  const {chestEmoji, phase, br, rarity, multi, cards} = opening;
  const [shaking, setShaking]         = React.useState(true);
  const [revealed, setRevealed]       = React.useState([]);
  const [showContinue, setShowContinue] = React.useState(false);
  const [animKey, setAnimKey]         = React.useState(0);

  // Multi-open animation: shake → reveal cards one by one
  React.useEffect(() => {
    if (!multi) return;
    setShaking(true);
    setRevealed([]);
    setShowContinue(false);
    const shakeTime = 1200;
    const shakeTimer = setTimeout(() => {
      setShaking(false);
      let i = 0;
      const interval = setInterval(() => {
        setRevealed(prev => {
          const next = [...prev, i];
          i++;
          if (i >= cards.length) {
            clearInterval(interval);
            setTimeout(() => setShowContinue(true), 400);
          }
          return next;
        });
      }, cards.length <= 5 ? 280 : 180);
    }, shakeTime);
    return () => clearTimeout(shakeTimer);
  }, [multi, opening]);

  if (multi) {
    return React.createElement('div', {className:'overlay', style:{overflowY:'auto', padding:'20px 10px'}},
      // Shaking chest phase
      shaking && React.createElement('div', {style:{textAlign:'center', padding:'60px 0'}},
        React.createElement('div', {
          className:'multi-chest-shake',
          style:{fontSize:'5em', display:'inline-block'}
        }, chestEmoji),
        React.createElement('div', {style:{color:'#aaa', fontSize:14, marginTop:16}},
          'Ouverture de ' + cards.length + ' coffres...'
        )
      ),
      // Cards reveal grid
      !shaking && React.createElement(React.Fragment, null,
        React.createElement('div', {style:{textAlign:'center', marginBottom:14}},
          React.createElement('div', {style:{fontSize:28}}, chestEmoji + ' × ' + cards.length),
          React.createElement('div', {style:{color:'#aaa', fontSize:13, marginTop:4}},
            revealed.length + ' / ' + cards.length + ' cartes révélées'
          )
        ),
        React.createElement('div', {style:{
          display:'flex', flexWrap:'wrap', gap:10, justifyContent:'center', maxWidth:700, margin:'0 auto 20px'
        }},
          cards.map(({br:c, rarity:rar}, i) => {
            const rc = RARITIES[rar];
            const isRevealed = revealed.includes(i);
            return React.createElement('div', {
              key: i,
              className: isRevealed ? 'multi-card-enter' : '',
              style:{
                background: isRevealed ? '#1a1a2e' : '#111',
                border: '2px solid ' + (isRevealed ? rc.color : '#333'),
                borderRadius: 12, padding:'10px 8px', textAlign:'center',
                width: 130, flexShrink: 0, overflow:'hidden',
                boxShadow: isRevealed ? '0 0 14px '+rc.color+'66' : 'none',
                opacity: isRevealed ? 1 : 0.15,
                transition: 'border-color 0.2s, background 0.2s',
                animationDelay: '0s'
              }
            },
              isRevealed
                ? React.createElement(React.Fragment, null,
                    IMGS[c.name]
                      ? React.createElement('img', {
                          src: IMGS[c.name], alt: c.name,
                          style:{width:90, height:90, objectFit:'cover', borderRadius:10, display:'block', margin:'0 auto 6px'}
                        })
                      : React.createElement('div', {style:{fontSize:'3em', lineHeight:'90px', textAlign:'center', marginBottom:6}}, c.emoji),
                    React.createElement('div', {style:{color:rc.color, fontSize:11, fontWeight:'bold', marginTop:2}}, rc.label),
                    React.createElement('div', {style:{color:'#ddd', fontSize:10, marginTop:2, wordBreak:'break-word', lineHeight:1.3}}, c.name)
                  )
                : React.createElement('div', {style:{fontSize:'2.5em', lineHeight:'90px', textAlign:'center', marginBottom:6}}, '❓')
            );
          })
        ),
        showContinue && React.createElement('button', {
          className:'continue-btn',
          style:{display:'block', margin:'0 auto'},
          onClick:onClose
        }, '🎉 Continuer !')
      )
    );
  }

  const r = RARITIES[rarity];
  return React.createElement('div', {className:'overlay'},
    phase === 'waiting' && React.createElement('div', {className:'waiting-chest-wrap'},
      React.createElement('div', {
        className:'waiting-chest-btn',
        onClick: onOpen,
        title: 'Clique pour ouvrir !'
      },
        React.createElement('div', {className:'waiting-chest-emoji'}, chestEmoji)
      )
    ),
    phase === 'shake' && React.createElement('div', {className:'opening-chest-anim'}, chestEmoji),
    (phase === 'reveal' || phase === 'ready') && React.createElement('div', {className:'card-reveal'},
      React.createElement('div', {className:'revealed-inner', style:{boxShadow:'0 0 40px '+r.color+'90'}},
        React.createElement('div', {className:'revealed-glow', style:{borderColor:r.color}}),
        React.createElement('div', {className:'revealed-label', style:{color:r.color}}, r.label),
        IMGS[br.name]
          ? React.createElement(ImgWithFallback, {src:IMGS[br.name], fallback:br.emoji, wrapClass:'revealed-img-wrap', emojiClass:'revealed-emoji'})
          : React.createElement('span', {className:'revealed-emoji'}, br.emoji),
        React.createElement('div', {className:'revealed-name'}, br.name),
        React.createElement('div', {className:'revealed-gain-txt'}, '⚡ +'+r.gain+' pièces/sec')
      )
    ),
    phase === 'ready' && React.createElement('button', {className:'continue-btn', onClick:onClose}, '🎉 Continuer !')
  );
}
